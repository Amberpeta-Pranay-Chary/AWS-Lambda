name: project ci cd

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Project
        run: mvn clean package

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload ZIP to S3
        run: |
          aws s3 cp target/AWS-Lambda-Example-1.0-SNAPSHOT-lambda-package.zip s3://pranaydhfm6/

      - name: Deploy ZIP to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name github-actions-demo \
            --s3-bucket pranaydhfm6 \
            --s3-key AWS-Lambda-Example-1.0-SNAPSHOT-lambda-package.zip

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name github-actions-demo

      - name: Deployment Successful
        run: echo "Lambda deployment completed successfully!"
